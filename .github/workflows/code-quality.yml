name: "code quality"
on:
  # Manual-only: this personal fork develops on macOS with local checks
  # (bun run lint, format:check, cargo fmt/clippy); the hosted runners keep
  # failing and burn Actions minutes. Trigger from the Actions tab if needed.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check translation consistency
        run: bun run check:translations

      - name: Run ESLint
        run: bun run lint

      - name: Run prettier
        run: bun run format:check
