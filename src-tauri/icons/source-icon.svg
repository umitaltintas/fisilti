<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1e0b3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded-square base (macOS superellipse-ish radius) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#sheen)"/>

  <!-- whisper glyph: source dot + radiating ripples (centered) -->
  <g filter="url(#soft)" transform="translate(-40 0)">
    <circle cx="350" cy="512" r="58" fill="#F5F3FF"/>
    <g fill="none" stroke="#F5F3FF" stroke-linecap="round">
      <path d="M468 392a168 168 0 0 1 0 240" stroke-width="60" opacity="0.95"/>
      <path d="M576 332a276 276 0 0 1 0 360" stroke-width="52" opacity="0.62"/>
      <path d="M684 280a374 374 0 0 1 0 464" stroke-width="44" opacity="0.34"/>
    </g>
  </g>
</svg>
